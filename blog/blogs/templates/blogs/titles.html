{% extends 'blogs/base.html' %}

{% block content %}
<div class="container mt-5">
  
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 class="fw-bold mb-0">My Blog Titles</h2>
      <p class="text-muted small">Manage and view your recent notes</p>
    </div>
    <a href="{% url 'blogs:new_title' %}" class="btn btn-primary shadow-sm">
      <i class="bi bi-plus-lg"></i> New Title
    </a>
  </div>

  <div class="card shadow-sm border-0">
    <div class="list-group list-group-flush">

      {% for t in title %}
        <a href="{% url 'blogs:note' t.id %}" 
           class="list-group-item list-group-item-action d-flex justify-content-between align-items-center py-3">
          
          <div class="d-flex align-items-center">
            <div class="bg-light rounded p-2 me-3">
              <span class="text-primary fw-bold">#</span>
            </div>
            <span class="h6 mb-0 text-dark">{{ t.title }}</span>
          </div>
          
          <span class="text-muted">&rarr;</span>
        </a>
      {% empty %}
        <div class="text-center py-5">
          <p class="text-muted mb-0">No notes added yet. Start by creating one!</p>
        </div>
      {% endfor %}

    </div>
  </div>

</div>

<style>
  /* Efecto suave de transición al pasar el mouse */
  .list-group-item-action {
    transition: all 0.2s ease;
  }
  .list-group-item-action:hover {
    background-color: #f8f9fa;
    transform: translateX(5px);
  }
</style>
{% endblock content %}
