{% extends 'blogs/base.html' %}

{% block content %}
<div class="container mt-5">
    
    <div class="border-bottom pb-3 mb-4 d-flex justify-content-between align-items-end">
        <div>
            <span class="badge bg-primary mb-2 text-uppercase tracking-wider">Blog Title</span>
            <h1 class="display-5 fw-bold">{{ title }}</h1>
        </div>
        <a href="{% url 'blogs:new_notes' title.id %}" class="btn btn-outline-primary rounded-pill px-4">
            <i class="bi bi-plus-lg"></i> Add New Entry
        </a>
    </div>

    <div class="row">
        <div class="col-lg-10 mx-auto">
            
            {% for n in note %}
                <div class="card shadow-sm border-0 mb-4 rounded-3 hover-lift">
                    <div class="card-body p-4">
                        <div class="d-flex justify-content-between align-items-start mb-3">
                            <div class="text-muted small">
                                <i class="bi bi-calendar3 me-1"></i>
                                {{ n.date_added|date:'M d, Y • H:i' }}
                            </div>
                            <a href="{% url 'blogs:edit_notes' n.id %}" class="btn btn-light btn-sm text-primary rounded-circle">
                                <i class="bi bi-pencil-square"></i>
                            </a>
                        </div>
                        
                        <div class="card-text lh-lg text-dark">
                            {{ n.note|linebreaks }}
                        </div>
                    </div>
                </div>
            {% empty %}
                <div class="text-center py-5 bg-light rounded-4 border border-dashed">
                    <i class="bi bi-journal-text display-1 text-muted opacity-25"></i>
                    <p class="mt-3 text-secondary fs-5">No entries have been added to this title yet.</p>
                    <a href="{% url 'blogs:new_notes' title.id %}" class="btn btn-primary mt-2">
                        Create the first note
                    </a>
                </div>
            {% endfor %}

        </div>
    </div>
</div>

<style>
    /* Efecto sutil de elevación al pasar el mouse */
    .hover-lift {
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .hover-lift:hover {
        transform: translateY(-3px);
        box-shadow: 0 1rem 3rem rgba(0,0,0,.1) !important;
    }

    /* Espaciado para mejorar la lectura */
    .card-text p {
        margin-bottom: 1rem;
    }

    .tracking-wider {
        letter-spacing: 0.1em;
    }
</style>
{% endblock content %}
